name: .NET

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

concurrency:
  group: dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish app
        run: dotnet publish LSPDFRManager.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Package release zip
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath LSPDFRManager-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: LSPDFRManager-${{ github.ref_name }}-win-x64.zip
